<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rembes Online Control</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; user-select: none; }
        .status-bar { background: #d32f2f; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 320px; margin: auto; }
        .mode-container { display: flex; justify-content: space-around; margin-bottom: 20px; }
        button { width: 100%; aspect-ratio: 1/1; border-radius: 20px; border: none; background: #333; color: white; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.1s; touch-action: manipulation; }
        button:active { background: #00ff00; color: black; transform: scale(0.95); }
        .btn-mode { height: 50px; aspect-ratio: auto; width: 45%; background: #2196F3; }
        .btn-stop { background: #f44336; font-size: 16px; }
        .btn-diag { background: #444; }
    </style>
</head>
<body>
    <h2 style="color: #FF9800;">REMBES ONLINE</h2>
    <div id="status" class="status-bar">MENGHUBUNGKAN KE CLOUD...</div>

    <div class="mode-container">
        <button class="btn-mode" onclick="send('auto')">AUTO MODE</button>
        <button class="btn-mode" onclick="send('manual')" style="background: #607d8b;">MANUAL</button>
    </div>

    <div class="grid">
        <button class="btn-diag" ontouchstart="send('fsl')" ontouchend="send('stop')">SERONG KIRI</button>
        <button ontouchstart="send('up')" ontouchend="send('stop')">MAJU</button>
        <button class="btn-diag" ontouchstart="send('fsr')" ontouchend="send('stop')">SERONG KANAN</button>
        
        <button ontouchstart="send('left')" ontouchend="send('stop')">KIRI</button>
        <button class="btn-stop" onclick="send('stop')">STOP</button>
        <button ontouchstart="send('right')" ontouchend="send('stop')">KANAN</button>
        
        <button class="btn-diag" ontouchstart="send('bsl')" ontouchend="send('stop')">MUNDUR L</button>
        <button ontouchstart="send('down')" ontouchend="send('stop')">MUNDUR</button>
        <button class="btn-diag" ontouchstart="send('bsr')" ontouchend="send('stop')">MUNDUR R</button>
    </div>

    <script>
        // Koneksi ke Broker MQTT via WebSocket
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const statusDiv = document.getElementById('status');

        client.on('connect', () => {
            statusDiv.innerText = 'TERHUBUNG KE CLOUD (READY)';
            statusDiv.style.background = '#4CAF50';
        });

        client.on('offline', () => {
            statusDiv.innerText = 'OFFLINE - CEK INTERNET';
            statusDiv.style.background = '#d32f2f';
        });

        function send(cmd) {
            client.publish('rembes/robot/control', cmd);
        }
    </script>
</body>
</html>
