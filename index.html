<!DOCTYPE html>
<html>
<head>
    <title>REMBES CONTROL</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); max-width: 300px; margin: 20px auto; }
        button { padding: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; border: none; }
        .speed { background: #333; padding: 15px; border-radius: 15px; margin: 20px auto; max-width: 300px; }
        input { width: 100%; }
    </style>
</head>
<body>
    <h2>REMBES PRODUCTION IOT</h2>
    <h1 id="dist">0 cm</h1>

    <div class="grid">
        <button onclick="send('fsl')">↖</button> <button onclick="send('up')">UP</button> <button onclick="send('fsr')">↗</button>
        <button onclick="send('left')">L</button> <button onclick="send('stop')" style="background:red">STOP</button> <button onclick="send('right')">R</button>
        <button onclick="send('bsl')">↙</button> <button onclick="send('down')">DN</button> <button onclick="send('bsr')">↘</button>
    </div>

    <div class="speed">
        Kecepatan: <span id="sv">750</span><br>
        <input type="range" min="300" max="1023" value="750" oninput="document.getElementById('sv').innerText=this.value; publishConfig('speed', this.value)">
    </div>

    <button onclick="send('auto')" style="background:orange">AUTO MODE</button>
    <button onclick="send('manual')" style="background:blue">MANUAL</button>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        // Ambil IP Pengakses
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(data => {
            client.on('connect', () => {
                client.publish('rembes/robot/control', 'user_ip:' + data.ip);
                client.subscribe('rembes/robot/status');
            });
        });

        client.on('message', (t, m) => {
            if(m.toString().startsWith('dist:')) document.getElementById('dist').innerText = m.toString().split(':')[1] + ' cm';
        });

        function send(cmd) { client.publish('rembes/robot/control', cmd); }
        function publishConfig(type, val) { client.publish('rembes/robot/config', type + ':' + val); }
    </script>
</body>
</html>
